name: CI
on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
      - 'citest-*'
  schedule:
    - cron: 13 21 * * *

jobs:
  docker-build-cache:
    name: docker build cache
    runs-on: ci-cd
    steps:
      - uses: docker/setup-buildx-action@v3
        with:
          install: true
      - uses: docker/build-push-action@v5
        id: build
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: fluree/server
          target: builder
          load: true

  cljfmt-check:
    name: cljfmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: 'latest'
          cljfmt: 'latest'
      - run: make cljfmt-check

  clj-kondo-lint:
    name: clj-kondo lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@12.5
        with:
          cli: 'latest'
          clj-kondo: 'latest'
      - run: make clj-kondo-lint-ci

  test:
    name: run tests
    needs: docker-build-cache
    runs-on: ci-cd
    steps:
      - uses: docker/setup-buildx-action@v3
        with:
          install: true
      - uses: docker/build-push-action@v5
        with:
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: fluree/server
          target: builder
          load: true
      - name: Run tests
        run: docker run fluree/server make test

  release:
    name: create release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ensure full history for branch detection

      - name: Log release version
        run: |
          echo "VERSION=${{ env.VERSION }}"

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: fluree
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and push image
        run: |
          docker tag fluree/server fluree/server:${VERSION}
          docker push fluree/server:${VERSION}

      - name: Check if commit is on main
        id: is_main
        run: |
          git fetch origin main --depth=1
          if git branch --contains $GITHUB_SHA | grep -q 'main'; then
            echo "on_main=true" >> $GITHUB_OUTPUT
          else
            echo "on_main=false" >> $GITHUB_OUTPUT
          fi

      - name: Tag and push latest
        if: steps.is_main.outputs.on_main == 'true' && !contains(env.VERSION, '-')
        run: |
          docker tag fluree/server fluree/server:latest
          docker push fluree/server:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            Docker image: https://hub.docker.com/r/fluree/server/tags?name=${{ github.ref_name }}

  notifications:
    name: send notifications
    if: always()
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - if: github.ref == 'refs/heads/main' && failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        uses: voxmedia/github-action-slack-notify-build@v2
        with:
          channel: development
          status: FAILED
          color: danger
